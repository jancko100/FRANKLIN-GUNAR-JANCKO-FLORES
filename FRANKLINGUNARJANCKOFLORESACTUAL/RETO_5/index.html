<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réplica Box Model</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      background: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

   
    .margin-box{
      background: orange;
      padding: 30px; 
      border-radius: 5px;
      position: relative;
    }

    .margin-text{
      position: absolute;
      top: 10px;
      left: 15px;
      font-weight: bold;
      font-size: 18px;
    }

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #f4f4f4;
            padding: 30px;
        }

        h1{
            margin-bottom: 30px;
            color: #111;
        }

        .contenedor{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .card{
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .card h2{
            margin-bottom: 20px;
        }

       
        header{
            background: #2563eb;
            padding: 15px;
            border-radius: 8px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo{
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }

      
        .titulo{
            color: blue;
            font-size: 40px;
            margin-bottom: 10px;
        }

        .parrafo{
            color: red;
            font-size: 20px;
        }

        
        .caja{
            background: white;
            padding: 40px;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        .caja p{
            margin-bottom: 20px;
            font-size: 22px;
        }

        button{
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 22px;
            cursor: pointer;
        }

      
        .gif{
            background: #ddd;
            padding: 100px;
            text-align: center;
            border-radius: 10px;
        }

        .gif img{
            width: 250px;
        }

      
        .video{
            background: #c8f7d1;
            padding: 100px;
            text-align: center;
            border-radius: 10px;
        }

        video{
            width: 300px;
            border-radius: 10px;
        }

        footer{
            background: black;
            color: white;
            text-align: center;
            padding: 25px;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <h1>Mini Página Web</h1>

    <div class="contenedor">

        <!-- 1 -->
        <div class="card">

            <h2>1. Encabezado con Enlaces</h2>

            <header>
                <div class="logo">Logo</div>

                <nav>
                    <a href="#">Inicio</a>
                    <a href="#">Retos</a>
                    <a href="#">GitHub</a>
                </nav>
            </header>

        </div>

        <!-- 2 -->
        <div class="card">

            <h2>2. Título y Párrafo</h2>

            <h3 class="titulo">Mi Título Azul</h3>

            <p class="parrafo">
                Este es un párrafo de color rojo con información importante.
            </p>

        </div>

        <!-- 3 -->
        <div class="card">

            <h2>3. La Caja y el Botón</h2>

            <div class="caja">

                <p>Caja con sombra</p>

                <button>MI BOTÓN</button>

            </div>

        </div>

        <!-- 4 -->
        <div class="card">

            <h2>4. Añade un GIF</h2>

            <div class="gif">

                <img src="30.gif" alt="GIF">

            </div>

        </div>

        <!-- 5 -->
        <div class="card">

            <h2>5. Añade un Video</h2>

            <div class="video">

                <video controls>
                    <source src="jherson.mp4" type="video/mp4">
                </video>

            </div>

        </div>

        <!-- 6 -->
        <div class="card">

            <h2>6. Footer</h2>

            <footer>
               FRANKLIN GUNAR JANCKO FLORES

            </footer>

        </div>

    </div>

</body>
</html>
